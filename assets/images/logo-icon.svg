<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="12" fill="#2563EB"/>
  <rect width="48" height="48" rx="12" fill="url(#icon-bg)" opacity="0.5"/>
  <!-- Ballot document shape -->
  <rect x="12" y="10" width="24" height="30" rx="3" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Scan lines with glow -->
  <line x1="16" y1="18" x2="32" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="16" y1="24" x2="32" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="30" x2="32" y2="30" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Check mark overlay -->
  <path d="M17 24L21.5 28.5L31 19" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top scan indicator -->
  <circle cx="36" cy="12" r="4" fill="#34d399"/>
  <defs>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
</svg>
