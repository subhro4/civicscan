<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Icon mark -->
  <rect width="48" height="48" rx="12" fill="#2563EB"/>
  <rect width="48" height="48" rx="12" fill="url(#logo-dark-bg)" opacity="0.5"/>
  <rect x="12" y="10" width="24" height="30" rx="3" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <line x1="16" y1="18" x2="32" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="16" y1="24" x2="32" y2="24" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="16" y1="30" x2="32" y2="30" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M17 24L21.5 28.5L31 19" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="36" cy="12" r="4" fill="#34d399"/>

  <!-- Wordmark -->
  <!-- "Civic" in Syne style - using path approximation with text -->
  <text x="60" y="29" font-family="Syne, sans-serif" font-weight="700" font-size="20" fill="white" letter-spacing="-0.5">Civic</text>
  <text x="110" y="29" font-family="Syne, sans-serif" font-weight="700" font-size="20" fill="#60A5FA" letter-spacing="-0.5">Scan</text>
  <!-- Tagline -->
  <text x="61" y="41" font-family="DM Sans, sans-serif" font-weight="400" font-size="9.5" fill="#8b949e" letter-spacing="0.5">EMPOWERING YOUR VOTE</text>

  <defs>
    <linearGradient id="logo-dark-bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
</svg>
